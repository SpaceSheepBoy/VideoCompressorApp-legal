<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --surface: #ffffff;
      --ink: #0b1437;
      --muted: #69749d;
      --line: rgba(11, 20, 55, 0.08);
      --primary: #2e5bff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0 56px;
    }

    article {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: clamp(24px, 5vw, 44px);
      box-shadow: 0 18px 48px rgba(11, 20, 55, 0.08);
    }

    h1, h2 {
      line-height: 1.15;
      letter-spacing: 0;
    }

    h1 {
      margin: 0 0 24px;
      font-size: clamp(32px, 7vw, 48px);
    }

    h2 {
      margin: 32px 0 10px;
      font-size: 22px;
    }

    p, li {
      color: var(--muted);
      font-size: 17px;
    }

    a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    ul {
      padding-left: 22px;
    }
  </style>
</head>
<body>
  <main>
    <article>
      {{ content }}
    </article>
  </main>
</body>
</html>
